name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Xray Core
        run: |
          mkdir -p app/src/main/assets
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip -O xray.zip
          unzip -o xray.zip -d app/src/main/assets/
          # Проверяем, есть ли файл xray, и переименовываем его для нашего приложения
          if [ -f app/src/main/assets/xray ]; then
            mv app/src/main/assets/xray app/src/main/assets/xray_binary
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FreedomVPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
